apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: dynamic-pricing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: your-registry/dynamic-pricing/catalog-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: POSTGRES_DSN
              value: postgres://postgres:postgres@postgres:5432/dynamic_pricing?sslmode=disable
            - name: REDIS_ADDR
              value: redis:6379
            - name: LISTEN_ADDR
              value: :8081
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: dynamic-pricing
spec:
  selector:
    app: catalog-service
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
