apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dynamic-pricing-gateway
  namespace: dynamic-pricing
spec:
  rules:
    - http:
        paths:
          - path: /catalog
            pathType: Prefix
            backend:
              service:
                name: catalog-service
                port:
                  number: 8081
          - path: /behavior
            pathType: Prefix
            backend:
              service:
                name: behavior-service
                port:
                  number: 8082
          - path: /pricing
            pathType: Prefix
            backend:
              service:
                name: pricing-service
                port:
                  number: 8083
          - path: /analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 8084
