global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'catalog-service'
    static_configs:
      - targets: ['catalog-service:8081']
  - job_name: 'behavior-service'
    static_configs:
      - targets: ['behavior-service:8082']
  - job_name: 'pricing-service'
    static_configs:
      - targets: ['pricing-service:8083']
  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:8084']
